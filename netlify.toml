# Netlify picks this up from the repo root. Build settings in the Netlify UI override these if set there.

[build]
  # Prebuild writes frontend/public/_redirects when NETLIFY_API_ORIGIN is set (see scripts/netlify-prebuild.mjs).
  command = "node scripts/netlify-prebuild.mjs && npm --workspace frontend run build"
  publish = "frontend/dist"

[build.environment]
  # Vite 8 + Rolldown expect a current Node; keeps Linux builds consistent with local dev.
  NODE_VERSION = "22"

# Single-page app: /services etc. must serve index.html (avoids 404 on refresh or deep links).
# _redirects from the prebuild script is processed first and sends /api/* to your backend.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
