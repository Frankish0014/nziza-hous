# Netlify picks this up from the repo root. Build settings in the Netlify UI override these if set there.

[build]
  # Prebuild always writes frontend/public/_redirects: /api/* proxy (if NETLIFY_API_ORIGIN) then SPA /* → index.html.
  command = "node scripts/netlify-prebuild.mjs && npm --workspace frontend run build"
  publish = "frontend/dist"

[build.environment]
  # Vite 8 + Rolldown expect a current Node; keeps Linux builds consistent with local dev.
  NODE_VERSION = "22"

# Redirects: use frontend/public/_redirects only (generated by scripts/netlify-prebuild.mjs) so /api/* is listed before the SPA rule.
